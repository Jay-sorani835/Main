<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsPortal Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-newspaper text-primary"></i> NewsPortal <span>Pro</span>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search news...">
            </div>
            <button class="btn btn-primary" onclick="openModal('createModal')">
                <i class="fa-solid fa-plus"></i> New Article
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        
        <!-- Sidebar Filters -->
        <aside class="sidebar">
            <h3 class="sidebar-title">Categories</h3>
            <ul class="category-list">
                <li class="category-item active" onclick="filterCategory('')">All News</li>
                <li class="category-item" onclick="filterCategory('Technology')"><i class="fa-solid fa-laptop-code"></i> Technology</li>
                <li class="category-item" onclick="filterCategory('Business')"><i class="fa-solid fa-chart-line"></i> Business</li>
                <li class="category-item" onclick="filterCategory('Sports')"><i class="fa-solid fa-volleyball"></i> Sports</li>
                <li class="category-item" onclick="filterCategory('Entertainment')"><i class="fa-solid fa-film"></i> Entertainment</li>
            </ul>

            <h3 class="sidebar-title mt-4">Sorting</h3>
            <select id="sortSelect" class="sort-select" onchange="fetchArticles()">
                <option value="publishedDate,DESC">Newest First</option>
                <option value="publishedDate,ASC">Oldest First</option>
                <option value="title,ASC">Title (A-Z)</option>
            </select>
        </aside>

        <!-- News Feed -->
        <section class="news-feed">
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
            </div>
            
            <div id="newsGrid" class="news-grid">
                <!-- Articles injected by JavaScript -->
            </div>

            <!-- Pagination Controls -->
            <div class="pagination" id="pagination">
                <button class="btn-page" id="prevPage" onclick="changePage(-1)"><i class="fa-solid fa-chevron-left"></i> Prev</button>
                <span id="pageInfo" class="page-info">Page 1 of 1</span>
                <button class="btn-page" id="nextPage" onclick="changePage(1)">Next <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </section>
    </main>

    <!-- Create/Edit Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Article</h2>
                <button class="close-btn" onclick="closeModal('createModal')"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="articleForm" onsubmit="submitArticle(event)">
                <input type="hidden" id="articleId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" required placeholder="Enter catching title">
                </div>
                
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>Author</label>
                        <input type="text" id="author" required placeholder="Author Name">
                    </div>
                    <div class="form-group flex-1">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="Technology">Technology</option>
                            <option value="Business">Business</option>
                            <option value="Sports">Sports</option>
                            <option value="Entertainment">Entertainment</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Content</label>
                    <textarea id="content" rows="6" required placeholder="Write the full news story here..."></textarea>
                </div>

                <div class="form-group">
                    <label>Featured Image</label>
                    <div class="file-drop-area">
                        <span class="choose-file-button">Choose files</span>
                        <span class="file-message" id="fileMessage">or drag and drop files here</span>
                        <input class="file-input" type="file" id="imageFile" accept="image/*" onchange="updateFileName()">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('createModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Publish Article</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
