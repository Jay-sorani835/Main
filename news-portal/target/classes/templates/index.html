<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/layout :: head(title=${title})}"></th:block>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Navbar -->
    <th:block th:replace="~{fragments/layout :: navbar}"></th:block>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

        <!-- Header Section -->
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight"
                th:text="${currentCategory == 'all' ? 'Latest Headlines' : title}">Latest Headlines</h1>
            <p class="mt-4 text-xl text-gray-600">Stay informed with the best Spring Boot MVC news portal.</p>
        </div>

        <!-- News Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Article Card -->
            <div th:each="article : ${articles}"
                class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 transform hover:-translate-y-1">
                <a th:href="@{'/article/' + ${article.id}}" class="block">
                    <img class="h-48 w-full object-cover" th:src="${article.imageUrl}" alt="Article Image">
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-3">
                            <span
                                class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"
                                th:text="${article.category.displayName}">Category</span>
                            <span class="text-sm text-gray-500"
                                th:text="${#temporals.format(article.publishedAt, 'MMM dd, HH:mm')}">Time</span>
                        </div>
                        <h2 class="text-xl font-bold text-gray-900 mb-2 line-clamp-2" th:text="${article.title}">Article
                            Title</h2>
                        <p class="text-gray-600 mb-4 line-clamp-3" th:text="${article.summary}">Article Summary...</p>

                        <div class="mt-4 flex items-center justify-between border-t border-gray-100 pt-4">
                            <div class="flex items-center">
                                <span class="text-sm font-medium text-gray-900" th:text="${article.author}">Author
                                    Name</span>
                            </div>
                            <span
                                class="text-primary hover:text-blue-700 text-sm font-semibold flex items-center gap-1">
                                Read more <i class="fa-solid fa-arrow-right"></i>
                            </span>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(articles)}" class="col-span-full text-center py-12">
                <i class="fa-regular fa-folder-open text-6xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-medium text-gray-900">No articles found</h3>
                <p class="text-gray-500 mt-2">Check back later for updates in this category.</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <th:block th:replace="~{fragments/layout :: footer}"></th:block>

</body>

</html>
